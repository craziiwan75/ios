name: iOS IPA Build

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate iOS project
        run: npx expo prebuild -p ios --no-install
        env:
          CI: 1
          EXPO_NO_GIT_STATUS: 1

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Patch swift-tools-version for Xcode 16.4 compatibility
        run: |
          find . -name "Package.swift" \
            ! -path "*/node_modules/.cache/*" \
            -exec sed -i '' 's|// swift-tools-version: 6\.2|// swift-tools-version: 6.1|g' {} \;
          echo "Patched swift-tools-version in $(find . -name 'Package.swift' ! -path '*/node_modules/.cache/*' | wc -l) files"

      - name: Patch expo-modules-jsi weak let → weak var
        run: |
          find node_modules/expo-modules-jsi -name "*.swift" \
            -exec sed -i '' 's/\bweak let\b/weak var/g' {} \;
          echo "Patched weak let in expo-modules-jsi"

      - name: Patch Pod targets (disable signing + force Swift 5 mode)
        run: |
          ruby - <<'RUBY'
          require 'xcodeproj'
          # ExpoModulesJSI uses Swift 5.9+ keywords (consuming/sending) and must stay in Swift 6 mode
          SWIFT6_TARGETS = %w[ExpoModulesJSI ExpoModulesWorklets].freeze
          proj = Xcodeproj::Project.open('ios/Pods/Pods.xcodeproj')
          proj.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['CODE_SIGNING_ALLOWED']        = 'NO'
              config.build_settings['CODE_SIGNING_REQUIRED']       = 'NO'
              config.build_settings['CODE_SIGN_IDENTITY']          = ''
              config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
              config.build_settings['SWIFT_STRICT_CONCURRENCY']    = 'minimal'
              unless SWIFT6_TARGETS.include?(target.name)
                config.build_settings['SWIFT_VERSION'] = '5.0'
              end
            end
          end
          proj.save
          swift5 = proj.targets.count { |t| !SWIFT6_TARGETS.include?(t.name) }
          puts "Patched #{proj.targets.count} pod targets: #{swift5} in Swift 5 mode, #{SWIFT6_TARGETS.count} kept in Swift 6 mode"
          RUBY

      - name: Build archive
        run: |
          cd ios
          WORKSPACE=$(find . -maxdepth 1 -name '*.xcworkspace' | head -1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" -json 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['workspace']['schemes'][0])")
          echo "Workspace: $WORKSPACE  Scheme: $SCHEME"
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath ../ios.xcarchive \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ios.xcarchive/Products/Applications/*.app Payload/
          cd Payload && zip -ry ../gongfeng-app.ipa *.app
          cd ..
          echo "IPA size: $(du -sh gongfeng-app.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: gongfeng-app.ipa
