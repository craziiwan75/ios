name: iOS IPA Build

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate iOS project
        run: npx expo prebuild -p ios --no-install
        env:
          CI: 1
          EXPO_NO_GIT_STATUS: 1

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Disable code signing for all Pod targets
        run: |
          ruby - <<'RUBY'
          require 'xcodeproj'
          proj = Xcodeproj::Project.open('ios/Pods/Pods.xcodeproj')
          proj.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['CODE_SIGNING_ALLOWED']      = 'NO'
              config.build_settings['CODE_SIGNING_REQUIRED']     = 'NO'
              config.build_settings['CODE_SIGN_IDENTITY']        = ''
              config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
            end
          end
          proj.save
          puts "Done: disabled signing for #{proj.targets.count} pod targets"
          RUBY

      - name: Build archive
        run: |
          set -e
          cd ios
          WORKSPACE=$(find . -maxdepth 1 -name '*.xcworkspace' | head -1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" -json 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['workspace']['schemes'][0])")
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath ../ios.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Verify archive & list structure
        run: |
          if [ ! -d ios.xcarchive ]; then
            echo "ERROR: ios.xcarchive 不存在，归档失败"
            exit 1
          fi
          echo "=== 归档目录结构 ==="
          find ios.xcarchive -type d | head -40

      - name: Package IPA
        run: |
          APP_PATH=$(find ios.xcarchive/Products/Applications -maxdepth 1 -name "*.app" -type d 2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "标准路径未找到，全局搜索..."
            APP_PATH=$(find ios.xcarchive -name "*.app" -type d \
              ! -path "*/Intermediates/*" \
              ! -path "*/PlugIns/*" \
              | head -1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: 归档中未找到任何 .app，构建失败"
            exit 1
          fi

          echo "使用 App 路径: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          cd Payload && zip -ry ../gongfeng-app.ipa *.app
          cd ..
          echo "IPA 大小: $(du -sh gongfeng-app.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: gongfeng-app.ipa
